<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>

    <!-- 각 단계 카드 그라디언트 -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>

    <!-- 카드 그림자 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="rgba(255,255,255,0.6)"/>
    </filter>

    <!-- 화살표 마커 -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1000" height="340" fill="url(#bgGrad)" rx="16"/>

  <!-- 배경 장식 원 -->
  <circle cx="50" cy="50" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="950" cy="290" r="100" fill="rgba(255,255,255,0.03)"/>
  <circle cx="500" cy="170" r="200" fill="rgba(255,255,255,0.02)"/>

  <!-- 타이틀 -->
  <text x="500" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="white" letter-spacing="2" opacity="0.95">마케팅 업무 흐름</text>
  <text x="500" y="56" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="1">MARKETING WORKFLOW</text>

  <!-- 연결선 (카드 사이) -->
  <!-- 1→2 -->
  <line x1="183" y1="175" x2="213" y2="175" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- 2→3 -->
  <line x1="369" y1="175" x2="399" y2="175" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- 3→4 -->
  <line x1="555" y1="175" x2="585" y2="175" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- 4→5 -->
  <line x1="741" y1="175" x2="771" y2="175" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ───────── STEP 1: 기획 ───────── -->
  <g filter="url(#shadow)">
    <rect x="28" y="90" width="155" height="170" rx="18" fill="url(#g1)"/>
    <rect x="28" y="90" width="155" height="170" rx="18" fill="rgba(255,255,255,0.07)"/>
  </g>
  <!-- 번호 배지 -->
  <circle cx="55" cy="107" r="13" fill="rgba(255,255,255,0.25)"/>
  <text x="55" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
  <!-- 아이콘: 전구 (기획) -->
  <g filter="url(#iconGlow)" transform="translate(105, 148)">
    <!-- 전구 몸체 -->
    <ellipse cx="0" cy="-12" rx="16" ry="18" fill="rgba(255,255,255,0.9)"/>
    <!-- 전구 아랫부분 -->
    <rect x="-8" y="5" width="16" height="5" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="-6" y="10" width="12" height="5" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="-4" y="15" width="8" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
    <!-- 빛살 -->
    <line x1="-22" y1="-12" x2="-28" y2="-12" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="-12" x2="28" y2="-12" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-16" y1="-26" x2="-20" y2="-31" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="-26" x2="20" y2="-31" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-32" x2="0" y2="-38" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="105" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="white">기획</text>
  <text x="105" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">목표 설정</text>
  <text x="105" y="244" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">전략 수립</text>

  <!-- ───────── STEP 2: 콘텐츠 제작 ───────── -->
  <g filter="url(#shadow)">
    <rect x="214" y="90" width="155" height="170" rx="18" fill="url(#g2)"/>
    <rect x="214" y="90" width="155" height="170" rx="18" fill="rgba(255,255,255,0.07)"/>
  </g>
  <circle cx="241" cy="107" r="13" fill="rgba(255,255,255,0.25)"/>
  <text x="241" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
  <!-- 아이콘: 펜/편집 (콘텐츠 제작) -->
  <g filter="url(#iconGlow)" transform="translate(291, 148)">
    <!-- 문서 -->
    <rect x="-14" y="-22" width="24" height="30" rx="3" fill="rgba(255,255,255,0.9)"/>
    <!-- 줄 -->
    <line x1="-9" y1="-14" x2="5" y2="-14" stroke="rgba(240,147,251,0.7)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="-7" x2="5" y2="-7" stroke="rgba(240,147,251,0.7)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="0" y2="0" stroke="rgba(240,147,251,0.7)" stroke-width="2" stroke-linecap="round"/>
    <!-- 펜 -->
    <g transform="rotate(-40) translate(6, -2)">
      <rect x="-3" y="-18" width="7" height="18" rx="2" fill="rgba(255,255,255,0.95)"/>
      <polygon points="-3,0 4,0 0.5,8" fill="rgba(255,255,255,0.95)"/>
      <rect x="-3" y="-20" width="7" height="4" rx="1" fill="rgba(255,200,200,0.9)"/>
    </g>
  </g>
  <text x="291" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="white">콘텐츠 제작</text>
  <text x="291" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">카피 작성</text>
  <text x="291" y="244" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">디자인 제작</text>

  <!-- ───────── STEP 3: 검토 ───────── -->
  <g filter="url(#shadow)">
    <rect x="400" y="90" width="155" height="170" rx="18" fill="url(#g3)"/>
    <rect x="400" y="90" width="155" height="170" rx="18" fill="rgba(255,255,255,0.07)"/>
  </g>
  <circle cx="427" cy="107" r="13" fill="rgba(255,255,255,0.25)"/>
  <text x="427" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
  <!-- 아이콘: 돋보기/체크 (검토) -->
  <g filter="url(#iconGlow)" transform="translate(477, 148)">
    <!-- 돋보기 원 -->
    <circle cx="-4" cy="-10" r="16" stroke="rgba(255,255,255,0.9)" stroke-width="4" fill="rgba(255,255,255,0.15)"/>
    <!-- 체크 -->
    <polyline points="-11,-10 -5,-4 5,-16" stroke="rgba(79,172,254,0.9)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 손잡이 -->
    <line x1="8" y1="1" x2="18" y2="14" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="477" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="white">검토</text>
  <text x="477" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">내부 승인</text>
  <text x="477" y="244" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">피드백 반영</text>

  <!-- ───────── STEP 4: 배포 ───────── -->
  <g filter="url(#shadow)">
    <rect x="586" y="90" width="155" height="170" rx="18" fill="url(#g4)"/>
    <rect x="586" y="90" width="155" height="170" rx="18" fill="rgba(255,255,255,0.07)"/>
  </g>
  <circle cx="613" cy="107" r="13" fill="rgba(255,255,255,0.25)"/>
  <text x="613" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">4</text>
  <!-- 아이콘: 로켓 (배포) -->
  <g filter="url(#iconGlow)" transform="translate(663, 148)">
    <!-- 로켓 몸체 -->
    <ellipse cx="0" cy="-14" rx="10" ry="18" fill="rgba(255,255,255,0.9)" transform="rotate(-30)"/>
    <!-- 창문 -->
    <circle cx="-2" cy="-18" r="4" fill="rgba(67,233,123,0.6)" transform="rotate(-30) translate(0,0)"/>
    <!-- 날개 왼 -->
    <polygon points="-8,2 -18,14 -8,10" fill="rgba(255,255,255,0.75)"/>
    <!-- 날개 오른 -->
    <polygon points="4,-4 16,4 6,8" fill="rgba(255,255,255,0.75)"/>
    <!-- 불꽃 -->
    <ellipse cx="6" cy="12" rx="4" ry="7" fill="rgba(255,220,100,0.85)" transform="rotate(-30) translate(-2,2)"/>
    <ellipse cx="6" cy="12" rx="2" ry="4" fill="rgba(255,150,50,0.85)" transform="rotate(-30) translate(-2,2)"/>
  </g>
  <text x="663" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="white">배포</text>
  <text x="663" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">채널 발행</text>
  <text x="663" y="244" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">스케줄 관리</text>

  <!-- ───────── STEP 5: 성과 분석 ───────── -->
  <g filter="url(#shadow)">
    <rect x="772" y="90" width="155" height="170" rx="18" fill="url(#g5)"/>
    <rect x="772" y="90" width="155" height="170" rx="18" fill="rgba(255,255,255,0.07)"/>
  </g>
  <circle cx="799" cy="107" r="13" fill="rgba(255,255,255,0.25)"/>
  <text x="799" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="white">5</text>
  <!-- 아이콘: 차트 (성과 분석) -->
  <g filter="url(#iconGlow)" transform="translate(849, 148)">
    <!-- 축 -->
    <line x1="-20" y1="12" x2="20" y2="12" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="12" x2="-20" y2="-22" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 막대 -->
    <rect x="-16" y="2" width="8" height="10" rx="2" fill="rgba(255,255,255,0.75)"/>
    <rect x="-4" y="-8" width="8" height="20" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="8" y="-18" width="8" height="30" rx="2" fill="rgba(255,255,255,1)"/>
    <!-- 상승 화살표 -->
    <polyline points="-12,0 0,-12 12,-20" stroke="rgba(254,225,64,0.95)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="16,-22 8,-18 12,-14" fill="rgba(254,225,64,0.95)"/>
  </g>
  <text x="849" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="white">성과 분석</text>
  <text x="849" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">KPI 측정</text>
  <text x="849" y="244" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">인사이트 도출</text>

  <!-- 하단 피드백 루프 화살표 -->
  <path d="M 927 280 Q 500 320 73 280" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="500" y="316" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1">지속적 개선 피드백 루프</text>
</svg>

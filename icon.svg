<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="192" height="192" fill="#1a1a2e"/>
  <!-- 박스 -->
  <rect x="20" y="20" width="152" height="152" rx="20" fill="url(#grad)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- 텍스트: 김 -->
  <text x="96" y="130" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">김</text>
</svg>
